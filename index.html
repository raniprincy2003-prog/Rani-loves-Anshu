<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>For Anshu ❤️</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}
body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(
-45deg,
#ff4d6d,
#ff758f,
#c9184a,
#7209b7,
#560bad
);
background-size:400% 400%;
animation:bg 12s ease infinite;
color:white;
}
@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}
.card{
width:90%;
max-width:700px;
padding:35px;
text-align:center;
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
border-radius:25px;
box-shadow:
0 0 30px rgba(255,255,255,.15);
}
h1{
font-size:3rem;
text-shadow:
0 0 10px white,
0 0 20px pink,
0 0 40px deeppink;
animation:pulse 2s infinite;
}
@keyframes pulse{
50%{
transform:scale(1.05);
}
}
button{
margin-top:25px;
padding:16px 35px;
font-size:1.1rem;
font-weight:bold;
border:none;
border-radius:50px;
cursor:pointer;
background:white;
color:#ff4081;
box-shadow:
0 0 20px white,
0 0 30px pink;
transition:.3s;
}
button:hover{
transform:scale(1.08);
}
.message{
display:none;
margin-top:25px;
font-size:1.3rem;
line-height:1.8;
animation:fade 2s forwards;
}
@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}
.heart,.rose{
position:absolute;
top:-50px;
pointer-events:none;
animation:fall linear forwards;
}
@keyframes fall{
to{
transform:
translateY(120vh)
rotate(360deg);
opacity:0;
}
}
</style>
</head>
<body>
<div class="card">
<h1>
❤️ I Love You So Much Anshu ❤️
</h1>
<button onclick="openHeart()">
💖 Unlock My Heart 💖
</button>
<div class="message" id="msg">

Every day with you feels brighter. ❤️

Every moment with you feels special.

Your smile makes ordinary days beautiful.

No matter where life takes us,
you will always have a special place in my heart.

🌹 Forever & Always 🌹

</div>
</div>
<script>
function openHeart(){
document.getElementById("msg").style.display="block";
}
function heart(){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=
(20+Math.random()*20)+"px";
h.style.animationDuration=
(5+Math.random()*5)+"s";
document.body.appendChild(h);
setTimeout(()=>{
h.remove();
},10000);
}
function rose(){
let r=document.createElement("div");
r.className="rose";
r.innerHTML="🌹";
r.style.left=Math.random()*100+"vw";
r.style.fontSize=
(18+Math.random()*15)+"px";
r.style.animationDuration=
(6+Math.random()*5)+"s";
document.body.appendChild(r);
setTimeout(()=>{
r.remove();
},11000);
}
setInterval(heart,250);
setInterval(rose,700);
</script>
</body>
</html>
