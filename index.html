<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>For Anshu ❤️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;
color:white;
}
.bg{
position:fixed;
inset:0;
background:url('IMG-20250830-WA0016.jpeg') center/cover;
filter:blur(12px) brightness(.35);
z-index:-2;
}
.overlay{
position:fixed;
inset:0;
background:linear-gradient(135deg,
rgba(255,0,120,.25),
rgba(128,0,255,.25));
z-index:-1;
}
.card{
width:90%;
max-width:700px;
padding:30px;
text-align:center;
background:rgba(255,255,255,.12);
backdrop-filter:blur(12px);
border-radius:25px;
}
.photo{
width:220px;
height:220px;
object-fit:cover;
border-radius:50%;
border:5px solid white;
box-shadow:0 0 25px pink;
animation:float 4s infinite ease-in-out;
}
@keyframes float{
50%{transform:translateY(-10px)}
}
h1{
margin-top:20px;
font-size:2.5rem;
text-shadow:0 0 20px hotpink;
}
button{
margin-top:20px;
padding:15px 30px;
font-size:18px;
border:none;
border-radius:40px;
cursor:pointer;
background:white;
color:#ff4081;
font-weight:bold;
}
.message{
display:none;
margin-top:20px;
font-size:1.2rem;
line-height:1.8;
}
.heart,.rose{
position:absolute;
top:-50px;
animation:fall linear forwards;
}
@keyframes fall{
to{
transform:translateY(120vh) rotate(360deg);
opacity:0;
}
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="overlay"></div>
<div class="card">
<img src="IMG-20250830-WA0016.jpeg" class="photo">
<h1>❤️ I Love You So Much Anshu ❤️</h1>
<button onclick="openHeart()">
💖 Unlock My Heart 💖
</button>
<div class="message" id="msg">
Every day with you feels brighter. ❤️<br><br>

Every moment with you feels special.

Your smile makes ordinary days beautiful.

🌹 Forever & Always 🌹

</div>
</div>
<audio id="music" loop>
<source src="song.mp3" type="audio/mpeg">
</audio>
<script>
function openHeart(){
document.getElementById("msg").style.display="block";
document.getElementById("music").play();
}
function heart(){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(20+Math.random()*20)+"px";
h.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),10000);
}
function rose(){
let r=document.createElement("div");
r.className="rose";
r.innerHTML="🌹";
r.style.left=Math.random()*100+"vw";
r.style.fontSize=(18+Math.random()*15)+"px";
r.style.animationDuration=(6+Math.random()*5)+"s";
document.body.appendChild(r);
setTimeout(()=>r.remove(),11000);
}
setInterval(heart,250);
setInterval(rose,700);
</script>
</body>
</html>
