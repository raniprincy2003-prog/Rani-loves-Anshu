<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Anshu ❤️</title>
<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}
body{
overflow:hidden;
height:100vh;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}
.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:url('photo.jpg');
background-size:cover;
background-position:center;
filter:blur(12px) brightness(.35);
z-index:-2;
}
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(
135deg,
rgba(255,0,100,.25),
rgba(130,0,255,.25)
);
z-index:-1;
}
.card{
width:90%;
max-width:750px;
text-align:center;
padding:30px;
border-radius:30px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
box-shadow:
0 0 40px rgba(255,255,255,.15);
color:white;
z-index:5;
}
.photo{
width:220px;
height:220px;
object-fit:cover;
border-radius:50%;
border:6px solid white;
box-shadow:
0 0 20px pink,
0 0 50px hotpink,
0 0 80px #ff69b4;
animation:float 4s ease-in-out infinite;
}
@keyframes float{
50%{
transform:translateY(-10px);
}
}
.title{
margin-top:20px;
font-size:3rem;
font-weight:bold;
text-shadow:
0 0 10px white,
0 0 20px pink,
0 0 40px deeppink;
animation:pulse 2s infinite;
}
@keyframes pulse{
50%{
transform:scale(1.05);
}
}
button{
margin-top:25px;
padding:16px 32px;
border:none;
border-radius:50px;
font-size:1.1rem;
font-weight:bold;
cursor:pointer;
background:white;
color:#ff3d7f;
box-shadow:
0 0 15px white,
0 0 30px pink;
transition:.3s;
}
button:hover{
transform:scale(1.08);
}
.message{
opacity:0;
max-height:0;
overflow:hidden;
transition:all 2s ease;
font-size:1.3rem;
line-height:1.8;
margin-top:25px;
}
.message.show{
opacity:1;
max-height:600px;
}
.footer{
margin-top:25px;
font-size:.95rem;
opacity:.85;
}
.heart,.rose{
position:absolute;
top:-50px;
pointer-events:none;
animation:fall linear forwards;
}
@keyframes fall{
to{
transform:
translateY(120vh)
rotate(360deg);
opacity:0;
}
}
.sparkle{
position:absolute;
pointer-events:none;
animation:spark 1.2s forwards;
}
@keyframes spark{
0%{
opacity:1;
transform:scale(1);
}
100%{
opacity:0;
transform:scale(2.5);
}
}
</style>
</head>
<body>
<div class="bg"></div>
<div class="overlay"></div>
<div class="card">
<img src="photo.jpg" class="photo">
<div class="title">
❤️ I Love You So Much Anshu ❤️
</div>
<button id="openBtn" onclick="openHeart()">
💖 Unlock My Heart 💖
</button>
<div class="message" id="msg">

Every day with you feels brighter. ❤️

Every moment with you feels special.

Your smile makes ordinary days beautiful.

No matter where life takes us,
you will always have a special place in my heart.

🌹 Forever & Always 🌹

</div>
<div class="footer">
Made with ❤️ just for Anshu
</div>
</div>
<audio id="music" loop>
<source src="song.mp3" type="audio/mpeg">
</audio>
<script>
function openHeart(){
document.getElementById("openBtn").style.display="none";
document.getElementById("msg")
.classList.add("show");
document.getElementById("music")
.play();
}
function createHeart(){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=
(20+Math.random()*20)+"px";
h.style.animationDuration=
(5+Math.random()*5)+"s";
document.body.appendChild(h);
setTimeout(()=>{
h.remove();
},10000);
}
function createRose(){
let r=document.createElement("div");
r.className="rose";
r.innerHTML="🌹";
r.style.left=Math.random()*100+"vw";
r.style.fontSize=
(18+Math.random()*18)+"px";
r.style.animationDuration=
(7+Math.random()*5)+"s";
document.body.appendChild(r);
setTimeout(()=>{
r.remove();
},12000);
}
setInterval(createHeart,250);
setInterval(createRose,800);
document.addEventListener("click",(e)=>{
let s=document.createElement("div");
s.className="sparkle";
s.innerHTML="✨";
s.style.left=e.pageX+"px";
s.style.top=e.pageY+"px";
document.body.appendChild(s);
setTimeout(()=>{
s.remove();
},1200);
});
</script>
</body>
</html>
